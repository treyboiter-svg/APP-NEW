<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OverlineEdge v8 — Odds + Air Density Dashboard</title>
<style>
:root{--bg:#07131f;--panel:#0d2233;--panel2:#102a3e;--accent:#42c5ee;--green:#2ecc71;--yellow:#f1c40f;--red:#e74c3c;--muted:#8ab0c5;--border:#1e3f57;--text:#edf8ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px}

.topbar{display:flex;align-items:center;gap:16px;padding:14px 20px;background:#061523;border-bottom:1px solid var(--border);flex-wrap:wrap}
.topbar h1{font-size:1.3rem;color:var(--accent);white-space:nowrap}
.sport-tabs{display:flex;gap:6px;flex-wrap:wrap}
.sport-tab{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem;transition:.15s}
.sport-tab.active{background:var(--accent);color:#021a28;border-color:var(--accent);font-weight:700}
.refresh-btn{margin-left:auto;padding:6px 14px;border-radius:8px;background:#1a4260;border:1px solid var(--border);color:var(--accent);cursor:pointer;font-size:.82rem}
.refresh-btn:hover{background:#234f72}
#last-updated{font-size:.78rem;color:var(--muted);margin-left:6px}

#game-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.game-row{background:var(--panel);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.15s;overflow:hidden}
.game-row:hover{border-color:var(--accent)}
.game-header{display:flex;align-items:center;gap:12px;padding:11px 14px;flex-wrap:wrap}
.matchup{font-size:1rem;font-weight:600;flex:1;min-width:160px}
.time-tag{font-size:.78rem;color:var(--muted);white-space:nowrap}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:99px;font-size:.74rem;font-weight:700;white-space:nowrap}
.badge-green{background:#0e3d22;color:var(--green);border:1px solid #1a6b3a}
.badge-yellow{background:#3d3100;color:var(--yellow);border:1px solid #7a6200}
.badge-grey{background:#1c2e3a;color:var(--muted);border:1px solid var(--border)}
.badge-blue{background:#0b2e42;color:var(--accent);border:1px solid #1a5070}
.badge-density{background:#0c2235;color:#7ee8ff;border:1px solid #1e4e6a;font-size:.72rem}

.detail-panel{display:none;border-top:1px solid var(--border);background:var(--panel2)}
.detail-panel.open{display:block}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{padding:9px 16px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;white-space:nowrap;border-bottom:2px solid transparent;transition:.12s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;padding:14px}
.tab-content.active{display:block}

table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:6px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600}
td{padding:6px 10px;border-bottom:1px solid #0d2030}
tr:last-child td{border:none}
.num{text-align:right;font-variant-numeric:tabular-nums}
.hl{color:var(--accent)}
.pos{color:var(--green)}
.neg{color:var(--red)}

/* Weather */
.wx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.wx-card{background:#08192a;border:1px solid var(--border);border-radius:9px;padding:12px}
.wx-card small{display:block;color:var(--muted);font-size:.76rem;margin-bottom:3px}
.wx-card b{display:block;font-size:1.25rem;color:var(--accent)}
.wx-card span{font-size:.78rem;color:var(--muted)}
.wx-timing{margin-bottom:12px;padding:9px 12px;background:#06111d;border:1px solid var(--border);border-radius:8px;font-size:.8rem;color:var(--muted);display:flex;gap:24px;flex-wrap:wrap}
.wx-timing b{color:#7ee8ff}
.wx-section{margin-top:12px;padding:10px 12px;background:#06111d;border:1px solid var(--border);border-radius:8px;font-size:.8rem;color:var(--muted)}
.wx-section-title{font-size:.76rem;font-weight:700;color:#7ee8ff;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.wx-section b{color:var(--text)}
.wx-section .wx-row{display:flex;flex-wrap:wrap;gap:8px 24px;margin-top:4px}
.wx-section .wx-kv{display:flex;flex-direction:column}
.wx-section .wx-kv small{color:var(--muted);font-size:.72rem}
.wx-section .wx-kv b{font-size:.9rem;color:var(--accent)}
.wx-indoor{margin-top:12px;padding:10px 12px;background:#0a1f10;border:1px solid #1a4a26;border-radius:8px;font-size:.8rem}
.wx-indoor b{color:#2ecc71}
.wx-indoor .wx-row{display:flex;flex-wrap:wrap;gap:8px 24px;margin-top:6px}
.wx-indoor .wx-kv small{color:#6ab87a;font-size:.72rem}
.wx-indoor .wx-kv b{font-size:.9rem;color:#2ecc71}
.wx-wind-panel{margin-top:12px;padding:10px 12px;background:#07192d;border:1px solid #1a4060;border-radius:8px;font-size:.8rem}
.wx-wind-panel b{color:#7ee8ff}
.wx-wind-panel .wx-row{display:flex;flex-wrap:wrap;gap:8px 24px;margin-top:6px}
.wx-wind-panel .wx-kv small{color:var(--muted);font-size:.72rem}
.wx-wind-panel .wx-kv b{font-size:.9rem;color:var(--accent)}
.wx-note{margin-top:8px;font-size:.76rem;color:var(--muted);line-height:1.5;border-left:2px solid var(--border);padding-left:8px}
.wx-unavail{padding:20px;text-align:center;color:var(--muted);font-size:.88rem}
.wx-src{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.7rem;background:#0d2235;border:1px solid #1e4060;color:var(--muted);margin-left:6px;vertical-align:middle}
.wx-indoor-badge{display:inline-block;padding:2px 8px;border-radius:4px;background:#0a2a12;border:1px solid #1a5020;color:#2ecc71;font-size:.72rem;font-weight:700;margin-left:6px}
.wx-outdoor-badge{display:inline-block;padding:2px 8px;border-radius:4px;background:#0c2235;border:1px solid #1a4060;color:#7ee8ff;font-size:.72rem;font-weight:700;margin-left:6px}

.venue-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;font-size:.82rem}
.venue-chip{background:#081927;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted)}
.venue-chip b{color:var(--text)}

#loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.bar-row{display:flex;align-items:center;gap:10px;margin:5px 0;font-size:.8rem}
.bar-label{width:120px;color:var(--muted);flex-shrink:0}
.bar-track{flex:1;background:#0d2030;border-radius:4px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
</style>
</head>
<body>

<div class="topbar">
  <h1>OverlineEdge <span style="color:var(--muted);font-weight:400">v8</span></h1>
  <div class="sport-tabs" id="sport-tabs">
    <button class="sport-tab active" data-sport="all">All</button>
    <button class="sport-tab" data-sport="mlb">MLB</button>
    <button class="sport-tab" data-sport="nfl">NFL</button>
    <button class="sport-tab" data-sport="nba">NBA</button>
    <button class="sport-tab" data-sport="nhl">NHL</button>
    <button class="sport-tab" data-sport="ncaaf">NCAAF</button>
    <button class="sport-tab" data-sport="ncaab">NCAAB</button>
    <button class="sport-tab" data-sport="wnba">WNBA</button>
  </div>
  <button class="refresh-btn" id="refresh-btn">&#8635; Refresh</button>
  <span id="last-updated"></span>
</div>

<div id="loading"><span class="spinner"></span>Loading dashboard&hellip;</div>
<div id="game-list" style="display:none"></div>

<script>
const API = 'http://127.0.0.1:8000';
let _data = {};
let _activeSport = 'all';

function fmt(v, dec=1) {
  if (v == null || v === '') return '\u2014';
  return typeof v === 'number' ? v.toFixed(dec) : v;
}
function fmtAm(v) {
  if (v == null) return '\u2014';
  return v > 0 ? '+'+v : String(v);
}
function badgeClass(disp) {
  if (disp == null) return 'badge-grey';
  if (disp >= 3) return 'badge-green';
  if (disp >= 1) return 'badge-yellow';
  return 'badge-grey';
}
function densityBadge(wx) {
  if (!wx) return '';
  // pull from nested pressure_density block (v8.4+) or flat legacy fields
  const pd  = wx.pressure_density || wx;
  const rho = pd.air_density_kgm3 ?? wx.air_density_kgm3;
  const pct = pd.density_pct_of_isa_sealevel ?? wx.density_pct_of_isa_sealevel;
  if (rho == null) return '';
  const label = wx.roof_type && wx.roof_type !== 'OUTDOOR' && wx.roof_type !== 'OPEN'
    ? ' <span style="font-size:.65rem;opacity:.7">(HVAC)</span>' : '';
  return `<span class="badge badge-density">&#961; ${rho.toFixed(4)} kg/m&#179; (${fmt(pct,1)}% ISA)${label}</span>`;
}

async function loadDashboard() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('game-list').style.display = 'none';
  try {
    const res = await fetch(API + '/api/dashboard');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    _data = await res.json();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
    renderGames();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<span style="color:#e74c3c">&#9888; Error: ${e.message}. Is run.bat running?</span>`;
  }
}

function allGames() {
  const games = [];
  for (const [sport, sd] of Object.entries(_data)) {
    for (const g of (sd.games || [])) games.push({...g, _sport: sport});
  }
  return games;
}

function renderGames() {
  const list = document.getElementById('game-list');
  list.innerHTML = '';
  const games = allGames().filter(g =>
    _activeSport === 'all' || g._sport === _activeSport
  );
  document.getElementById('loading').style.display = 'none';
  list.style.display = 'flex';
  if (!games.length) {
    list.innerHTML = '<div style="color:var(--muted);padding:30px;text-align:center">No games found.</div>';
    return;
  }
  for (const g of games) list.appendChild(buildGameRow(g));
}

function buildGameRow(g) {
  const wrapper = document.createElement('div');
  wrapper.className = 'game-row';

  const mh = g.implied_matrix_home || {};
  const maxDisp = Math.max(mh.kalshi_disparity ?? -1, mh.poly_disparity ?? -1);
  const wx = (g.venue || {}).weather_context;

  const header = document.createElement('div');
  header.className = 'game-header';
  header.innerHTML = `
    <span class="matchup">${g.title}</span>
    <span class="time-tag">${g._sport.toUpperCase()} &bull; ${g.commence || 'TBD'}</span>
    <div class="badges">
      ${maxDisp >= 0 ? `<span class="badge ${badgeClass(maxDisp)}">${fmt(maxDisp,1)}% edge</span>` : ''}
      ${densityBadge(wx)}
      ${g.venue?.name ? `<span class="badge badge-grey">${g.venue.name}</span>` : ''}
    </div>`;

  const detail = document.createElement('div');
  detail.className = 'detail-panel';
  detail.innerHTML = buildDetailHTML(g);

  header.addEventListener('click', () => {
    const isOpen = detail.classList.contains('open');
    document.querySelectorAll('.detail-panel.open').forEach(el => el.classList.remove('open'));
    if (!isOpen) detail.classList.add('open');
  });

  setTimeout(() => {
    detail.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const panel = btn.closest('.detail-panel');
        panel.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        panel.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        panel.querySelector('#tab-' + btn.dataset.tab + '-' + g.game_id).classList.add('active');
      });
    });
  }, 0);

  wrapper.appendChild(header);
  wrapper.appendChild(detail);
  return wrapper;
}

function buildDetailHTML(g) {
  const id   = g.game_id;
  const tabs = ['Moneyline','Spread','Total O/U','Pred Markets','Disparity','Power Method','Weather & Air Density'];
  const keys = ['ml','spread','total','pred','disp','power','weather'];
  const tabBar = tabs.map((t,i)=>`<button class="tab-btn${i===0?' active':''}" data-tab="${keys[i]}">${t}</button>`).join('');
  return `
    <div class="tab-bar">${tabBar}</div>
    <div class="tab-content active" id="tab-ml-${id}">${buildMLTab(g)}</div>
    <div class="tab-content" id="tab-spread-${id}">${buildSpreadTab(g)}</div>
    <div class="tab-content" id="tab-total-${id}">${buildTotalTab(g)}</div>
    <div class="tab-content" id="tab-pred-${id}">${buildPredTab(g)}</div>
    <div class="tab-content" id="tab-disp-${id}">${buildDispTab(g)}</div>
    <div class="tab-content" id="tab-power-${id}">${buildPowerTab(g)}</div>
    <div class="tab-content" id="tab-weather-${id}">${buildWeatherTab(g)}</div>`;
}

function buildMLTab(g) {
  const pb = g.per_book || {};
  if (!Object.keys(pb).length) return '<p style="color:var(--muted);padding:10px">No moneyline data.</p>';
  let rows = '';
  for (const [book, bd] of Object.entries(pb)) {
    rows += `<tr><td>${book}</td>
      <td class="num">${fmtAm(bd.away_american)}</td><td class="num">${fmtAm(bd.home_american)}</td>
      <td class="num">${fmt(bd.away_raw,2)}%</td><td class="num">${fmt(bd.home_raw,2)}%</td>
      <td class="num">${fmt(bd.away_nv_prop,2)}%</td><td class="num">${fmt(bd.home_nv_prop,2)}%</td>
      <td class="num">${fmt(bd.vig_pct,3)}%</td></tr>`;
  }
  const c = g.consensus || {};
  const ch = c.home || {}; const ca = c.away || {};
  return `<table><thead><tr><th>Book</th><th class="num">Away ML</th><th class="num">Home ML</th>
    <th class="num">Away Raw%</th><th class="num">Home Raw%</th>
    <th class="num">Away NV%</th><th class="num">Home NV%</th>
    <th class="num">Vig%</th></tr></thead><tbody>${rows}</tbody>
  <tfoot><tr style="background:#061520"><td><b>CONSENSUS</b></td>
    <td class="num hl">${fmtAm(ca.american)}</td><td class="num hl">${fmtAm(ch.american)}</td>
    <td class="num">${fmt(ca.raw_implied,2)}%</td><td class="num">${fmt(ch.raw_implied,2)}%</td>
    <td class="num hl">${fmt(ca.no_vig_implied,2)}%</td><td class="num hl">${fmt(ch.no_vig_implied,2)}%</td>
    <td></td></tr></tfoot></table>`;
}

function buildSpreadTab(g) {
  const pb = g.per_book || {};
  let rows = '';
  for (const [book, bd] of Object.entries(pb)) {
    const sh = bd.spreads?.home || {}; const sa = bd.spreads?.away || {};
    rows += `<tr><td>${book}</td>
      <td class="num">${fmt(sa.point,1)}</td><td class="num">${fmtAm(sa.american)}</td><td class="num">${fmt(sa.implied,2)}%</td>
      <td class="num">${fmt(sh.point,1)}</td><td class="num">${fmtAm(sh.american)}</td><td class="num">${fmt(sh.implied,2)}%</td></tr>`;
  }
  if (!rows) return '<p style="color:var(--muted);padding:10px">No spread data.</p>';
  return `<table><thead><tr><th>Book</th>
    <th class="num">Away Pt</th><th class="num">Away ML</th><th class="num">Away Imp%</th>
    <th class="num">Home Pt</th><th class="num">Home ML</th><th class="num">Home Imp%</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function buildTotalTab(g) {
  const pb = g.per_book || {};
  let rows = '';
  for (const [book, bd] of Object.entries(pb)) {
    const ov = bd.totals?.Over || {}; const un = bd.totals?.Under || {};
    rows += `<tr><td>${book}</td>
      <td class="num">${fmt(ov.point,1)}</td><td class="num">${fmtAm(ov.american)}</td><td class="num">${fmt(ov.implied,2)}%</td>
      <td class="num">${fmt(un.point,1)}</td><td class="num">${fmtAm(un.american)}</td><td class="num">${fmt(un.implied,2)}%</td></tr>`;
  }
  if (!rows) return '<p style="color:var(--muted);padding:10px">No totals data.</p>';
  return `<table><thead><tr><th>Book</th>
    <th class="num">O Pt</th><th class="num">O ML</th><th class="num">O Imp%</th>
    <th class="num">U Pt</th><th class="num">U ML</th><th class="num">U Imp%</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function buildPredTab(g) {
  const k = g.kalshi || {}; const p = g.polymarket || {};
  const mh = g.implied_matrix_home || {}; const ma = g.implied_matrix_away || {};
  return `<table><thead><tr><th>Market</th><th class="num">Home Imp%</th><th class="num">Away Imp%</th>
    <th class="num">Home ML</th><th class="num">H Disparity</th><th class="num">H EV%</th>
  </tr></thead><tbody>
    <tr><td>Kalshi</td>
      <td class="num hl">${fmt(k.home_implied,2)}%</td>
      <td class="num">${k.home_implied != null ? fmt(100-k.home_implied,2)+'%' : '\u2014'}</td>
      <td class="num">${fmtAm(k.american)}</td>
      <td class="num ${badgeClass(mh.kalshi_disparity)}">${fmt(mh.kalshi_disparity,2)}%</td>
      <td class="num ${(mh.kalshi_ev??0)>=0?'pos':'neg'}">${fmt(mh.kalshi_ev,2)}%</td></tr>
    <tr><td>Polymarket</td>
      <td class="num hl">${fmt(p.home_implied,2)}%</td>
      <td class="num">${fmt(p.away_implied,2)}%</td>
      <td class="num">${fmtAm(p.american)}</td>
      <td class="num ${badgeClass(mh.poly_disparity)}">${fmt(mh.poly_disparity,2)}%</td>
      <td class="num ${(mh.poly_ev??0)>=0?'pos':'neg'}">${fmt(mh.poly_ev,2)}%</td></tr>
  </tbody></table>
  ${p.question ? `<p style="font-size:.78rem;color:var(--muted);margin-top:8px">Poly Q: ${p.question}</p>` : ''}`;
}

function buildDispTab(g) {
  const mh = g.implied_matrix_home || {};
  return [
    ['Kalshi Disp', mh.kalshi_disparity],
    ['Poly Disp',   mh.poly_disparity],
    ['Kalshi EV%',  mh.kalshi_ev],
    ['Poly EV%',    mh.poly_ev],
  ].map(([label, val]) => {
    if (val == null) return `<div class="bar-row"><span class="bar-label">${label}</span><span style="color:var(--muted)">&mdash;</span></div>`;
    const w     = Math.min(Math.abs(val) * 10, 100);
    const color = val >= 3 ? 'var(--green)' : val >= 1 ? 'var(--yellow)' : 'var(--muted)';
    return `<div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}"></div></div>
      <span style="color:${color};font-size:.8rem;width:50px;text-align:right">${fmt(val,2)}%</span></div>`;
  }).join('');
}

function buildPowerTab(g) {
  const pb = g.per_book || {};
  const mh = g.implied_matrix_home || {}; const ma = g.implied_matrix_away || {};
  let rows = '';
  for (const [book, bd] of Object.entries(pb)) {
    rows += `<tr><td>${book}</td>
      <td class="num">${fmt(bd.away_raw,2)}%</td><td class="num">${fmt(bd.away_nv_prop,2)}%</td><td class="num">${fmt(bd.away_nv_power,2)}%</td>
      <td class="num">${fmt(bd.home_raw,2)}%</td><td class="num">${fmt(bd.home_nv_prop,2)}%</td><td class="num">${fmt(bd.home_nv_power,2)}%</td></tr>`;
  }
  return `<table><thead><tr><th>Book</th>
    <th class="num">Away Raw%</th><th class="num">Away Prop%</th><th class="num">Away Power%</th>
    <th class="num">Home Raw%</th><th class="num">Home Prop%</th><th class="num">Home Power%</th>
  </tr></thead><tbody>${rows}</tbody>
  <tfoot><tr style="background:#061520"><td><b>CONSENSUS</b></td><td></td><td></td>
    <td class="num hl">${fmt(ma.power_odds,2)}%</td><td></td><td></td>
    <td class="num hl">${fmt(mh.power_odds,2)}%</td></tr></tfoot></table>`;
}

// ===========================================================================
// WEATHER TAB — v8.4.1  Full render: pressure block, wind vs stadium, indoor
// ===========================================================================
function buildWeatherTab(g) {
  const v  = g.venue || {};
  const wx = v.weather_context;

  const elevFt = wx?.elevation_ft ?? (v.elevation != null ? v.elevation : null);
  const elevM  = wx?.elevation_m  ?? (v.elevation != null ? Math.round(v.elevation * 0.3048) : null);

  // Venue info bar
  const roofType  = wx?.roof_type || v.roof_type || '';
  const roofBadge = roofType && roofType !== 'OUTDOOR' && roofType !== 'OPEN'
    ? `<span class="wx-indoor-badge">&#127959; ${roofType}</span>`
    : (roofType ? `<span class="wx-outdoor-badge">&#127758; ${roofType}</span>` : '');

  const venueInfo = `
    <div class="venue-row">
      ${v.name  ? `<div class="venue-chip"><b>${v.name}</b>${roofBadge}</div>` : ''}
      ${v.city  ? `<div class="venue-chip">${v.city}${v.state ? ', '+v.state : ''}</div>` : ''}
      ${elevFt != null ? `<div class="venue-chip">Elev: <b>${Math.round(elevFt).toLocaleString()} ft</b>${elevM != null?' <span style="font-size:.72rem">('+Math.round(elevM)+' m)</span>':''}</div>` : ''}
      ${v.orientation_label ? `<div class="venue-chip">Orientation: <b>${v.orientation_label}</b>${v.orientation_deg!=null?' ('+v.orientation_deg.toFixed(0)+'&deg;)':''}</div>` : ''}
      ${v.lat != null ? `<div class="venue-chip">Coords: <b>${v.lat.toFixed(4)}, ${v.lon.toFixed(4)}</b></div>` : ''}
    </div>`;

  if (!wx) return venueInfo + '<div class="wx-unavail">&#9888; No weather data &mdash; restart server.</div>';
  if (wx.status !== 'ok') return venueInfo + `<div class="wx-unavail">&#9888; Status: <b>${wx.status}</b></div>`;

  const srcBadge = wx.wx_source ? `<span class="wx-src">${wx.wx_source}</span>` : '';
  const gameET     = wx.game_time_et_full || wx.game_time_et || wx.game_time_raw || '\u2014';
  const forecastET = wx.forecast_hour_et_full || wx.forecast_hour_et || wx.forecast_hour_local || wx.forecast_hour_utc || '\u2014';

  const timingBlock = `<div class="wx-timing">
    <div>&#127942; Game Time: <b>${gameET}</b> ET</div>
    <div>&#127769; Forecast Slot: <b>${forecastET}</b>${srcBadge}</div>
    ${wx.elev_source ? `<div>Elev Source: <b>${wx.elev_source}</b></div>` : ''}
    ${wx.roof_closed != null ? `<div>Roof: <b style="color:${wx.roof_closed?'#2ecc71':'#42c5ee'}">${wx.roof_closed?'CLOSED (HVAC)':'OPEN'}</b></div>` : ''}
  </div>`;

  // Pull density from nested block (v8.4+) or flat fallback
  const pd = wx.pressure_density || {};
  const rho      = pd.air_density_kgm3      ?? wx.air_density_kgm3;
  const pctSL    = pd.density_pct_of_isa_sealevel   ?? wx.density_pct_of_isa_sealevel;
  const pctElev  = pd.density_pct_of_isa_elevation  ?? wx.density_pct_of_isa_elevation;
  const daFt     = pd.density_altitude_ft   ?? wx.density_altitude_ft;
  const stHpa    = pd.station_pressure_hpa  ?? wx.station_pressure_hpa;
  const stInhg   = pd.station_pressure_inhg ?? wx.station_pressure_inhg;
  const stPa     = pd.station_pressure_pa   ?? (stHpa ? stHpa * 100 : null);
  const mslpHpa  = pd.sea_level_pressure_hpa  ?? wx.sea_level_pressure_hpa;
  const mslpInhg = pd.sea_level_pressure_inhg ?? wx.sea_level_pressure_inhg;
  const precipIn = wx.precipitation_inh ?? (wx.precipitation_mmh != null ? wx.precipitation_mmh / 25.4 : null);

  // Main weather cards
  const cards = [
    { label: 'Air Density',
      val:  rho != null ? `${rho.toFixed(5)} kg/m&#179;` : '\u2014',
      sub:  `${fmt(pctSL,2)}% ISA sea-level<br>${fmt(pctElev,2)}% ISA @ elev` },
    { label: 'Station Pressure',
      val:  stInhg != null ? `${stInhg.toFixed(4)} inHg` : '\u2014',
      sub:  `${stHpa != null ? stHpa.toFixed(2) : '\u2014'} hPa &nbsp;|&nbsp; ${stPa != null ? stPa.toFixed(0) : '\u2014'} Pa` },
    { label: 'Temperature',
      val:  `${fmt(wx.temperature_f,1)} &#176;F`,
      sub:  `${fmt(wx.temperature_c,1)} &#176;C` },
    { label: 'Rel. Humidity',
      val:  `${fmt(wx.relative_humidity_pct,0)}%`,
      sub:  'At venue elevation' },
    { label: 'Wind Speed',
      val:  wx.wind_speed_mph != null ? `${wx.wind_speed_mph.toFixed(1)} mph` : '\u2014',
      sub:  wx.wind_speed_kmh != null ? `${wx.wind_speed_kmh.toFixed(1)} km/h` : '' },
    { label: 'Wind Direction',
      val:  (() => {
        const ws = wx.wind_vs_stadium || {};
        if (ws.wind_dir_label) return `${ws.wind_dir_label} (${ws.wind_dir_deg != null ? ws.wind_dir_deg.toFixed(0) : '\u2014'}&deg;)`;
        if (wx.wind_direction_deg != null) return `${wx.wind_direction_deg.toFixed(0)}&deg;`;
        return '\u2014';
      })(),
      sub:  'Meteorological (from)' },
    { label: 'Precipitation',
      val:  precipIn != null ? `${precipIn.toFixed(3)} in/h` : '\u2014',
      sub:  `${fmt(wx.precipitation_mmh,2)} mm/h` },
    { label: 'Density Altitude',
      val:  daFt != null ? `${daFt.toLocaleString()} ft` : '\u2014',
      sub:  daFt != null ? `${Math.round(daFt*0.3048).toLocaleString()} m` : '' },
  ];
  const grid = `<div class="wx-grid">${cards.map(c=>`<div class="wx-card"><small>${c.label}</small><b>${c.val}</b><span>${c.sub}</span></div>`).join('')}</div>`;

  // ---- Absolute Pressure block ----
  const pressureBlock = `<div class="wx-section">
    <div class="wx-section-title">&#128207; True Absolute Pressure</div>
    <div class="wx-row">
      <div class="wx-kv"><small>Station (Absolute)</small><b>${stInhg!=null?stInhg.toFixed(4):'\u2014'} inHg</b></div>
      <div class="wx-kv"><small>hPa</small><b>${stHpa!=null?stHpa.toFixed(2):'\u2014'}</b></div>
      <div class="wx-kv"><small>Pa</small><b>${stPa!=null?stPa.toFixed(0):'\u2014'}</b></div>
      <div class="wx-kv"><small>Sea-Level Ref (MSLP)</small><b>${mslpInhg!=null?mslpInhg.toFixed(3):'\u2014'} inHg&nbsp;<span style="font-size:.7rem;color:var(--muted)">(display only)</span></b></div>
      ${mslpHpa!=null?`<div class="wx-kv"><small>MSLP hPa</small><b>${mslpHpa.toFixed(2)}</b></div>`:''}
    </div>
    <div style="margin-top:6px;font-size:.74rem;color:var(--muted)">Station pressure = true absolute surface pressure at venue elevation. MSLP is normalised to sea level for reference only &mdash; never use for density calcs.</div>
  </div>`;

  // ---- ISA reference ----
  const isa = pd.isa_at_elevation || wx.isa_at_elevation || {};
  const isaFt  = isa.elevation_m != null ? Math.round(isa.elevation_m * 3.28084) : elevFt;
  const isaBlock = isa.pressure_hpa ? `<div class="wx-section">
    <div class="wx-section-title">&#127760; ISA Reference @ ${isaFt!=null?isaFt.toLocaleString()+' ft':'venue elev'}</div>
    <div class="wx-row">
      <div class="wx-kv"><small>ISA Pressure</small><b>${isa.pressure_inhg!=null?isa.pressure_inhg.toFixed(4):'\u2014'} inHg</b></div>
      <div class="wx-kv"><small>hPa</small><b>${isa.pressure_hpa!=null?isa.pressure_hpa.toFixed(2):'\u2014'}</b></div>
      <div class="wx-kv"><small>ISA Density</small><b>${isa.density_kgm3!=null?isa.density_kgm3.toFixed(5):'\u2014'} kg/m&#179;</b></div>
      <div class="wx-kv"><small>ISA Temp</small><b>${isa.temp_c!=null?isa.temp_c.toFixed(1):'\u2014'} &#176;C</b></div>
    </div>
  </div>` : '';

  // ---- Wind vs Stadium ----
  const wvs = wx.wind_vs_stadium || {};
  let windBlock = '';
  if (wvs.status === 'ok') {
    windBlock = `<div class="wx-wind-panel">
      <div class="wx-section-title" style="color:#7ee8ff">&#127788; Wind vs Stadium Orientation</div>
      <div class="wx-row">
        <div class="wx-kv"><small>Wind From</small><b>${wvs.wind_dir_label||'\u2014'} (${wvs.wind_dir_deg!=null?wvs.wind_dir_deg.toFixed(0):'\u2014'}&deg;)</b></div>
        <div class="wx-kv"><small>Field Axis</small><b>${wvs.field_orientation_label||'\u2014'} (${wvs.field_orientation_deg!=null?wvs.field_orientation_deg.toFixed(0):'\u2014'}&deg;)</b></div>
        <div class="wx-kv"><small>Relative Angle</small><b>${wvs.relative_angle_deg!=null?wvs.relative_angle_deg.toFixed(1)+'&deg;':'\u2014'}</b></div>
        <div class="wx-kv"><small>Headwind</small><b style="color:${(wvs.headwind_mph||0)>0?'#e74c3c':'#2ecc71'}">${wvs.headwind_mph!=null?(wvs.headwind_mph>0?'+':'')+wvs.headwind_mph.toFixed(1)+' mph':'\u2014'}</b></div>
        <div class="wx-kv"><small>Crosswind</small><b>${wvs.crosswind_mph!=null?Math.abs(wvs.crosswind_mph).toFixed(1)+' mph ('+wvs.crosswind_dir.replace('_',' ')+')':'\u2014'}</b></div>
        <div class="wx-kv"><small>Effect</small><b style="color:#f1c40f">${wvs.wind_effect_label||'\u2014'}</b></div>
      </div>
    </div>`;
  } else if (wvs.status === 'not_applicable_indoor') {
    windBlock = `<div class="wx-wind-panel">
      <div class="wx-section-title" style="color:#7ee8ff">&#127788; Wind vs Stadium</div>
      <span style="color:var(--muted)">&#127959; Indoor / roofed venue &mdash; wind analysis not applicable. ${wvs.note||''}</span>
    </div>`;
  } else if (wvs.status === 'insufficient_data' && wvs.wind_dir_deg != null) {
    windBlock = `<div class="wx-wind-panel">
      <div class="wx-section-title" style="color:#7ee8ff">&#127788; Wind Direction</div>
      <span style="color:var(--muted)">Wind from ${wvs.wind_dir_label||''} (${wvs.wind_dir_deg.toFixed(0)}&deg;) &mdash; no stadium orientation on file for headwind calc.</span>
    </div>`;
  }

  // ---- Indoor HVAC block ----
  let indoorBlock = '';
  if (wx.roof_closed) {
    const indoorRho = rho; // already uses HVAC model
    const outdoorRho = pd.outdoor_density_kgm3;
    const deltaStr   = pd.density_pct_vs_outdoor != null
      ? `${pd.density_pct_vs_outdoor >= 0 ? '+' : ''}${pd.density_pct_vs_outdoor.toFixed(2)}% vs outdoor`
      : '';
    indoorBlock = `<div class="wx-indoor">
      <b>&#127959; Indoor / HVAC Baseline</b> &nbsp;&mdash;&nbsp; ${pd.indoor_temp_f != null ? pd.indoor_temp_f+'&#176;F' : '70&#176;F'} / ${pd.indoor_rh_pct != null ? pd.indoor_rh_pct+'%' : '45%'} RH (estimated)<br>
      <div class="wx-row">
        <div class="wx-kv"><small>Indoor Density</small><b>${indoorRho!=null?indoorRho.toFixed(5):'\u2014'} kg/m&#179;</b></div>
        ${outdoorRho!=null?`<div class="wx-kv"><small>Outdoor Density</small><b>${outdoorRho.toFixed(5)} kg/m&#179;</b></div>`:''}
        ${deltaStr?`<div class="wx-kv"><small>Delta vs Outdoor</small><b>${deltaStr}</b></div>`:''}
        ${daFt!=null?`<div class="wx-kv"><small>Density Altitude</small><b>${daFt.toLocaleString()} ft</b></div>`:''}
      </div>
      <div style="margin-top:5px;font-size:.74rem;color:#6ab87a">${pd.note||'HVAC baseline. Absolute pressure same as outdoors — buildings are not hermetically sealed.'}</div>
    </div>`;
  }

  const note = `<div class="wx-note">Station pressure = absolute surface pressure at venue elevation, not sea-level adjusted. MSLP shown for reference only. Indoor density uses HVAC baseline (70&deg;F / 45% RH); absolute pressure is always from outdoor station. Density altitude accounts for temperature and humidity deviation from ISA standard.</div>`;

  return venueInfo + timingBlock + grid + pressureBlock + isaBlock + windBlock + indoorBlock + note;
}

document.getElementById('sport-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.sport-tab');
  if (!btn) return;
  document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _activeSport = btn.dataset.sport;
  renderGames();
});

document.getElementById('refresh-btn').addEventListener('click', loadDashboard);
loadDashboard();
</script>
</body>
</html>
